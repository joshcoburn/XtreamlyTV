name: Android TV

on:
  push:
    paths:
      - 'apps/android-tv/**'
      - 'packages/design-tokens/**'
      - 'packages/contracts/**'
      - 'scripts/**'
      - '.github/workflows/android-tv.yml'
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: android-actions/setup-android@v3
      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager 'platforms;android-36' 'build-tools;36.0.0' 'platform-tools'
      - name: Generate shared design tokens
        run: node scripts/generate-tokens.mjs
      - name: Test and build Android TV
        working-directory: apps/android-tv
        run: ./gradlew :app:testDebugUnitTest :app:assembleDebug
      - uses: actions/upload-artifact@v7
        with:
          name: xtreamlytv-android-tv-debug
          path: apps/android-tv/app/build/outputs/apk/debug/app-debug.apk
