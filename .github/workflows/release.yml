name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: android-actions/setup-android@v3
      - name: Install tools
        run: |
          npm install -g @webos-tools/cli
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager 'platforms;android-36' 'build-tools;36.0.0' 'platform-tools'
      - name: Prepare and test shared/webOS code
        run: |
          npm run prepare:apps
          npm run check:versions
          npm run check:webos
          npm run check:bridge
          npm run test:core
      - name: Build webOS
        run: npm run build:webos
      - name: Build Android TV debug artifact
        working-directory: apps/android-tv
        run: ./gradlew :app:testDebugUnitTest :app:assembleDebug
      - name: Checksums
        run: |
          mkdir -p dist/release
          cp dist/webos/*.ipk dist/release/
          cp apps/android-tv/app/build/outputs/apk/debug/app-debug.apk dist/release/XtreamlyTV-AndroidTV-debug.apk
          cd dist/release
          sha256sum * > SHA256SUMS.txt
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          files: |
            dist/release/*
